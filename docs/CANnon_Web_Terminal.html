<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANNON | Terminal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    
    <style>
        /* overflow-y: scroll prevents horizontal jumping between pages */
        body { font-family: 'Helvetica', 'Arial', sans-serif; background-color: #f8fafc; color: #0f172a; overflow-y: scroll; }
        .hero-gradient { background-color: #f0f2f5; }
        
        /* Terminal Specific Styles */
        .terminal-wrapper {
            background-color: #000000;
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #1e293b;
        }
        .xterm { padding: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="border-b border-gray-200 bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="text-lg tracking-tighter text-slate-900"><span class="font-extrabold">CAN</span>NON</span>
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-sm font-medium text-slate-600 hover:text-green-600">Dashboard</a>
                <a href="CANnon_Web_Terminal.html" class="text-sm font-bold text-green-600">Terminal</a>
                <a href="https://github.com/brendoncc/CANnon" class="text-sm font-medium text-slate-600 hover:text-green-600">GitHub</a>
            </div>
        </div>
    </nav>

    <header class="hero-gradient pt-10 pb-10 border-b border-gray-100 text-center">
        <div class="max-w-5xl mx-auto px-6">
            <h1 class="text-3xl md:text-4xl font-normal tracking-tight text-slate-900 uppercase">
                Wireless Terminal
            </h1>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center pt-8 pb-6 px-6">
        
        <div class="w-full max-w-4xl flex justify-between items-center mb-3 px-2">
            <p id="status" class="text-slate-500 font-bold tracking-widest uppercase text-sm">Status: Disconnected</p>
            
            <button id="connectBtn" class="bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-lg font-bold shadow-md shadow-slate-900/20 transition-all flex items-center gap-2 text-sm">
                <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5l11 11L12 23V1l5.5 5.5-11 11"/></svg>
                Connect via Bluetooth
            </button>
        </div>

        <div class="w-full max-w-4xl terminal-wrapper">
            <div id="terminal-container" style="height: 450px; width: 100%;"></div>
        </div>

    </main>

    <footer class="max-w-7xl w-full mx-auto px-6 py-6 mt-auto">
        <div class="flex flex-col md:flex-row justify-between items-center text-slate-400 text-xs uppercase tracking-[0.2em] font-bold border-t border-slate-200 pt-6">
            <p>© 2026 brendoncc | CANNON Project</p>
            <div class="flex gap-10 mt-4 md:mt-0">
                <a href="https://github.com/brendoncc/CANnon" class="hover:text-slate-900 transition">GitHub</a>
                <a href="#top" class="hover:text-slate-900 transition">Back to Top</a>
            </div>
        </div>
    </footer>

    <script>
        const NUS_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const NUS_RX_UUID      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const NUS_TX_UUID      = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let bleDevice;
        let rxCharacteristic;

        const connectBtn = document.getElementById('connectBtn');
        const statusDiv = document.getElementById('status');

        const btIconGreen = `<svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5l11 11L12 23V1l5.5 5.5-11 11"/></svg>`;
        const btIconRed = `<svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5l11 11L12 23V1l5.5 5.5-11 11"/></svg>`;

        // --- 1. Initialize the xterm.js Terminal ---
        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#000000' },
            fontFamily: 'Consolas, monospace',
            fontSize: 15
        });
        term.open(document.getElementById('terminal-container'));

        // --- 2. Handle Keystrokes (Browser -> STM32) ---
        term.onData(async function(data) {
            if (!rxCharacteristic) return;
            try {
                const encoder = new TextEncoder();
                const bytes = encoder.encode(data);
                for (let i = 0; i < bytes.length; i += 20) {
                    const chunk = bytes.slice(i, i + 20);
                    await rxCharacteristic.writeValueWithoutResponse(chunk);
                    await new Promise(r => setTimeout(r, 10)); 
                }
            } catch (error) {
                console.error("BLE TX Error:", error);
            }
        });

        // --- 3. Handle Incoming Data (STM32 -> Browser) ---
		function handleNotifications(event) {
            const value = event.target.value;
            let text = new TextDecoder().decode(value);
            text = text.replace(/[\b\x7f]/g, '\b \b');
            term.write(text); 
        }

        // --- 4. BLE Connection Logic ---
        connectBtn.addEventListener('click', async () => {
            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
                return;
            }

            try {
                // FIX: Call requestDevice IMMEDIATELY to preserve the mouse click gesture!
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'CANnon' }],
                    optionalServices: [NUS_SERVICE_UUID]
                });

                // Update UI only AFTER the browser approves the Bluetooth request
                statusDiv.innerText = "Status: Connecting to GATT Server...";
                statusDiv.className = "text-slate-500 font-bold tracking-widest uppercase text-sm";
                
                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(NUS_SERVICE_UUID);
                rxCharacteristic = await service.getCharacteristic(NUS_RX_UUID);
                const txCharacteristic = await service.getCharacteristic(NUS_TX_UUID);

                await txCharacteristic.startNotifications();
                txCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);

                statusDiv.innerText = `Status: Connected to ${bleDevice.name}`;
                statusDiv.className = "text-green-600 font-bold tracking-widest uppercase text-sm";
                connectBtn.innerHTML = btIconRed + ' Disconnect';

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Status: Connection Failed / Cancelled";
                statusDiv.className = "text-red-500 font-bold tracking-widest uppercase text-sm";
            }
        });

        function onDisconnected() {
            statusDiv.innerText = "Status: Disconnected";
            statusDiv.className = "text-slate-500 font-bold tracking-widest uppercase text-sm";
            connectBtn.innerHTML = btIconGreen + ' Connect via Bluetooth';
            rxCharacteristic = null;
        }
    </script>
</body>
</html>
